<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7B35CC"/>
      <stop offset="100%" stop-color="#4B0EA0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="rgba(0,0,0,0.35)"/>
    </filter>
    <filter id="glow-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background square with rounded corners -->
  <rect width="200" height="200" rx="0" fill="url(#bgGrad)"/>

  <!-- Inner glow overlay -->
  <ellipse cx="100" cy="85" rx="85" ry="70" fill="url(#glow)"/>

  <!-- White glow behind letters -->
  <ellipse cx="100" cy="105" rx="68" ry="48" fill="rgba(255,255,255,0.12)" filter="url(#glow-filter)"/>

  <!-- S letter - chunky rounded 3D style -->
  <g filter="url(#shadow)">
    <!-- S shape: top arc, middle, bottom arc -->
    <path d="
      M 52 72
      C 52 62, 60 55, 70 55
      L 88 55
      C 95 55, 100 60, 100 67
      C 100 74, 95 79, 88 79
      L 66 79
      C 59 79, 54 84, 54 91
      C 54 98, 59 103, 66 103
      L 90 103
      C 97 103, 102 108, 102 115
      C 102 122, 97 127, 90 127
      L 70 127
      C 60 127, 52 120, 52 110
    "
    stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- M letter -->
  <g filter="url(#shadow)">
    <polyline
      points="108,127 108,60 138,100 168,60 168,127"
      stroke="white" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Top highlight shine on S -->
  <path d="M 56 68 C 58 60, 64 56, 72 56 L 86 56"
    stroke="rgba(255,255,255,0.5)" stroke-width="4" stroke-linecap="round" fill="none"/>

  <!-- Top highlight shine on M -->
  <path d="M 112 65 L 136 98" stroke="rgba(255,255,255,0.4)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M 164 65 L 140 98" stroke="rgba(255,255,255,0.4)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>
